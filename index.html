<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>Duramente Progeny Database</title>
  <link rel="stylesheet" href="style.css?v=20260717b">
</head>
<body>
  <header class="topbar">
    <div>
      <p class="kicker">Local Database</p>
      <h1>ドゥラメンテ産駒</h1>
    </div>
    <nav class="main-nav" aria-label="sections">
      <button class="active" type="button" data-view="progeny">産駒一覧｜产驹检索</button>
      <button type="button" data-view="sire">種牡馬成績｜种牡马表现</button>
      <button type="button" data-view="pedigree">血統分析｜血统分析</button>
      <button type="button" data-view="production">生産・繁殖｜牧场与繁殖母马</button>
      <button type="button" data-view="racecourse">競馬場分析｜赛马场表现</button>
      <button type="button" data-view="method">データ・方法｜数据与方法</button>
    </nav>
  </header>

  <main class="layout view active" id="progenyView">
    <aside class="filters">
      <div class="filter-search-row">
        <label class="search">
          <span>検索</span>
          <input id="search" type="search" placeholder="馬名・母・馬主・調教師・牧場">
        </label>
        <button id="resetFilters" class="reset-filters" type="button">重置</button>
      </div>

      <details class="filter-group" open>
        <summary>基础</summary>
        <div class="filter-row">
          <label>
            <span>生年</span>
            <select id="year">
              <option value="">すべて</option>
            </select>
          </label>
          <label>
            <span>性別</span>
            <select id="sex">
              <option value="">すべて</option>
            </select>
          </label>
        </div>
        <div class="filter-row">
          <label>
            <span>毛色</span>
            <select id="color">
              <option value="">すべて</option>
            </select>
          </label>
          <label>
            <span>最高戦績</span>
            <select id="achievement">
              <option value="">すべて</option>
            </select>
          </label>
        </div>
      </details>

      <details class="filter-group">
        <summary>关系人</summary>
        <label>
          <span>所属</span>
          <select id="region">
            <option value="">すべて</option>
          </select>
        </label>
        <label>
          <span>調教師</span>
          <select id="trainer">
            <option value="">すべて</option>
          </select>
        </label>
        <label>
          <span>馬主</span>
          <select id="owner">
            <option value="">すべて</option>
          </select>
        </label>
        <label>
          <span>牧場</span>
          <select id="breeder">
            <option value="">すべて</option>
          </select>
        </label>
      </details>

      <details class="filter-group" open>
        <summary>血统</summary>
        <label>
          <span>母父系</span>
          <select id="bmsLine">
            <option value="">すべて</option>
          </select>
        </label>
        <label>
          <span>母父</span>
          <select id="broodmareSire">
            <option value="">すべて</option>
          </select>
        </label>
        <label>
          <span>牝系</span>
          <select id="femaleFamily">
            <option value="">すべて</option>
          </select>
        </label>
        <label>
          <span>生产时母龄</span>
          <select id="damAgeBucket">
            <option value="">すべて</option>
          </select>
        </label>
      </details>

      <details class="filter-group">
        <summary>第二马生</summary>
        <label>
          <span>第二马生</span>
          <select id="breeding">
            <option value="">すべて</option>
          </select>
        </label>
      </details>
    </aside>

    <section class="content">
      <div class="toolbar">
        <div>
          <h2>産駒一覧</h2>
          <p id="resultCount"></p>
        </div>
        <div class="toolbar-actions">
          <select id="sort">
            <option value="earnings_netkeiba">賞金</option>
            <option value="birth_year">生年</option>
            <option value="name">馬名</option>
          </select>
          <button id="direction" type="button" aria-label="sort direction">↓</button>
        </div>
      </div>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>馬名</th>
              <th>生年</th>
              <th>性</th>
              <th>毛色</th>
              <th>所属</th>
              <th>母</th>
              <th>牝系</th>
              <th>母父</th>
              <th>馬主</th>
              <th>調教師</th>
              <th>賞金</th>
              <th>主な勝鞍</th>
            </tr>
          </thead>
          <tbody id="horseRows"></tbody>
        </table>
      </div>

      <div class="pager">
        <button id="prev" type="button">‹</button>
        <span id="pageLabel"></span>
        <button id="next" type="button">›</button>
      </div>
    </section>
  </main>

  <main class="analysis-shell view" id="sireView" hidden>
    <section class="analysis-page" id="sireContent"></section>
  </main>

  <main class="analysis-shell view" id="pedigreeView" hidden>
    <section class="analysis-page" id="pedigreeContent"></section>
  </main>

  <main class="analysis-shell view" id="productionView" hidden>
    <section class="analysis-page" id="productionContent"></section>
  </main>

  <main class="analysis-shell view" id="racecourseView" hidden>
    <section class="analysis-page" id="racecourseContent"></section>
  </main>

  <main class="analysis-shell view" id="methodView" hidden>
    <section class="analysis-page" id="methodContent"></section>
  </main>

  <div class="drawer" id="drawer" aria-hidden="true">
    <button class="drawer-backdrop" id="closeBackdrop" type="button" aria-label="close"></button>
    <aside class="drawer-panel">
      <button class="icon-button close" id="closeDrawer" type="button" aria-label="close">×</button>
      <div id="detail"></div>
    </aside>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
  <script>window.STATIC_DATA_BASE = "data";</script>
  <script src="app.js?v=20260717b"></script>
</body>
</html>
